services:
  - type: web
    name: AI4Doctors
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: APP_VERSION
        value: 0.2.0
      - key: BUILD_TIME
        value: ""
      - key: NCBI_EMAIL
        value: ai4doctors@integraeyecare.com
      - key: NCBI_TOOL
        value: AI4Doctors
      - key: CACHE_TTL_SECONDS
        value: "3600"
